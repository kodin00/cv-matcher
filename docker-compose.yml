services:
  backend:
    build:
      context: ./be
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - backend_db:/app/data
    env_file:
      - ./be/backend/.env
    environment:
      DATABASE_URL: sqlite:////app/data/app.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./fe
      dockerfile: Dockerfile
    ports:
      - "4000:80"
    env_file:
      - ./be/backend/.env
    environment:
      API_UPSTREAM: http://backend:5000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  backend_db:
